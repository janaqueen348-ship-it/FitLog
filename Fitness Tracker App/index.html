<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLog - Daily Workout Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h2 class="main-title">Fitness Tracker</h2>
    <p class="subtitle">Log your daily workouts using JavaScript</p>

    <div class="form-box">
        <input type="text" id="exerciseName" placeholder="Exercise Name (e.g., Bench Press)">
        <input type="text" id="exerciseWeight" placeholder="Weight (KG)">
        <input type="text" id="exerciseReps" placeholder="Reps / Sets (e.g., 4x12)">
        
        <button id="saveBtn">Log Workout</button>
    </div>

    <p id="message"></p>

    <h2 class="section-title">Today's Workouts</h2>
    <div id="workoutList">
        </div>
</div>
<script src="script.js">S</script>
</body>
</html>
